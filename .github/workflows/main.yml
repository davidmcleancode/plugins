name: Build SubOsc VST3

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build --config Release
      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: SubOsc-macOS-VST3
          path: build/**/*.vst3

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build
      - name: Build
        run: cmake --build build --config Release
      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: SubOsc-Windows-VST3
          path: build/**/*.vst3
